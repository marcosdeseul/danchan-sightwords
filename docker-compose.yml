services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sight_words
      POSTGRES_USER: sight_words
      POSTGRES_PASSWORD: sight_words
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sight_words -d sight_words"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 4173
      DATABASE_URL: postgres://sight_words:sight_words@postgres:5432/sight_words
      SESSION_SECRET: local-development-secret-change-me
    ports:
      - "4173:4173"

volumes:
  postgres-data:
